kind = "web"
previewPath = "/"
title = "KaamMitra"
version = "1.0.0"
id = "artifacts/kaam-mitra"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22369

[services.development]
run = "pnpm --filter @workspace/kaam-mitra run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kaam-mitra", "run", "build" ]
publicDir = "artifacts/kaam-mitra/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22369"
BASE_PATH = "/"
